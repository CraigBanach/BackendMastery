name: Integration Tests

on:
  workflow_call:
    inputs:
      backend-image:
        description: 'Backend Docker image tag to use'
        type: string
        required: false
      frontend-image:
        description: 'Frontend Docker image tag to use'
        type: string
        required: false
    outputs:
      success:
        description: 'Whether tests were successful'
        value: ${{ jobs.full-stack-integration-tests.outputs.success }}

jobs:
  full-stack-integration-tests:
    runs-on: ubuntu-latest
    outputs:
      success: ${{ steps.set-success.outputs.success }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./full-stack-integration-tests/package-lock.json"

      - name: Install Dependencies
        working-directory: ./full-stack-integration-tests
        run: npm ci

      - name: Pull images from registry
        if: inputs.backend-image && inputs.frontend-image
        run: |
          echo "Using backend image: ${{ inputs.backend-image }}"
          echo "Using frontend image: ${{ inputs.frontend-image }}"
          docker pull ${{ inputs.backend-image }}
          docker pull ${{ inputs.frontend-image }}

      - name: Start Environment (using pre-built images)
        if: inputs.backend-image && inputs.frontend-image
        env:
          BACKEND_IMAGE: ${{ inputs.backend-image }}
          FRONTEND_IMAGE: ${{ inputs.frontend-image }}
        run: |
          # Create a temporary compose override with the specific images
          cat > docker-compose.test.images.yml << EOF
          services:
            backend:
              image: ${BACKEND_IMAGE}
            frontend:
              image: ${FRONTEND_IMAGE}
          EOF
          docker compose -f docker-compose.test.yml -f docker-compose.test.images.yml up -d

      - name: Start Environment (build locally - fallback)
        if: ${{ !inputs.backend-image || !inputs.frontend-image }}
        run: docker compose -f docker-compose.test.yml -f docker-compose.test.override.yml up -d --build

      - name: Wait for Services
        run: |
          echo "Waiting for backend..."
          timeout 120s bash -c 'until curl -s http://localhost:5000/healthz > /dev/null; do sleep 2; done'
          echo "Backend is ready!"
          
          echo "Waiting for frontend..."
          timeout 120s bash -c 'until curl -s http://localhost:3000 > /dev/null; do sleep 2; done'
          echo "Frontend is ready!"

      - name: Run Full-Stack Integration Tests
        run: |
          docker run --rm \
            --network host \
            -v "${{ github.workspace }}:/work" \
            -w /work/full-stack-integration-tests \
            mcr.microsoft.com/playwright:v1.57.0-jammy \
            npx playwright test


      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-stack-integration-report
          path: full-stack-integration-tests/playwright-report/
          retention-days: 7
          
      - name: Stop Environment
        if: always()
        run: |
          if [ -f docker-compose.test.images.yml ]; then
            docker compose -f docker-compose.test.yml -f docker-compose.test.images.yml down
            rm docker-compose.test.images.yml
          else
            docker compose -f docker-compose.test.yml -f docker-compose.test.override.yml down
          fi

      - name: Set success status
        if: success()
        id: set-success
        run: echo "success=true" >> $GITHUB_OUTPUT
